  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
    }

    .hero-gradient {
      /* Lớp 9 Cuối kỳ: Emerald → Sky → Indigo → Rose */
      background: linear-gradient(135deg, #065f46 0%, #0369a1 25%, #4338ca 60%, #be185d 100%);
    }

    .gradient-text {
      background: linear-gradient(135deg, #065f46 0%, #4338ca 50%, #be185d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(3, 105, 161, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(3, 105, 161, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(3, 105, 161, 0);
      }
    }

    .pulse-btn {
      animation: pulse-ring 2s infinite;
    }

    /* Custom scrollbar for modal */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #c7c7c7;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    /* Hoa phượng animations */
    .phuong-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      will-change: transform, opacity;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, -50px, 0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.8;
      }

      90% {
        opacity: 0.8;
      }

      100% {
        transform: translate3d(var(--end-x), 100vh, 0) rotate(var(--rot));
        opacity: 0;
      }
    }

    @keyframes sway {

      0%,
      100% {
        transform: rotate(-5deg);
      }

      50% {
        transform: rotate(5deg);
      }
    }

    .branch {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
      transform-origin: top right;
      animation: sway 6s ease-in-out infinite;
    }

    .branch-right {
      top: -20px;
      right: -20px;
    }

    .branch-left {
      bottom: -20px;
      left: -20px;
      transform-origin: bottom left;
      animation-direction: reverse;
      transform: rotate(180deg) scale(-1, 1) !important;
    }

<body class="bg-slate-50 text-slate-800 antialiased">
  <!-- Hoa phuong background decoration -->
  <div class="phuong-container" id="petals"></div>
  <svg class="branch branch-right" width="300" height="300" viewBox="0 0 200 200" fill="none">
    <path d="M200 0C150 20 100 80 50 150" stroke="#795548" stroke-width="6" stroke-linecap="round" />

    <!-- Leaves -->

    <ellipse cx="120" cy="80" rx="15" ry="5" fill="#4CAF50" transform="rotate(-20 120 80)" />
    <!-- Flowers -->
    <circle cx="100" cy="80" r="12" fill="#E53935" />
    <circle cx="110" cy="70" r="10" fill="#FF5252" />
    <circle cx="90" cy="90" r="10" fill="#D32F2F" />

    <circle cx="60" cy="140" r="15" fill="#E53935" />
    <circle cx="75" cy="130" r="12" fill="#FF5252" />

    <!-- Pistils -->
    <line x1="100" y1="80" x2="95" y2="65" stroke="#FFD54F" stroke-width="2" />
    <line x1="100" y1="80" x2="105" y2="60" stroke="#FFD54F" stroke-width="2" />
    <circle cx="95" cy="65" r="2" fill="#FFC107" />
    <circle cx="105" cy="60" r="2" fill="#FFC107" />
  </svg>

  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
  <script>
    // Hoa phuong falling petals logic
    const container = document.getElementById('petals');
    const colors = ['#e63946', '#ff4d5a', '#ff6b6b', '#ff8585', '#d63031', '#eb4d4b'];

    function createPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';

      const size = Math.random() * 14 + 12; // 12-26px
      const color = colors[Math.floor(Math.random() * colors.length)];

      // Basic petal SVG shapes
      const svg = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}">
        <path d="M12,2 C15,2 20,8 20,13 C20,18 15,22 12,22 C9,22 4,18 4,13 C4,8 9,2 12,2 Z" />
      </svg>`;

      petal.innerHTML = svg;

      // Random start properties
      const startX = Math.random() * window.innerWidth;
      const endX = startX + (Math.random() * 200 - 100);
      const rot = Math.random() * 360 + 360 + 'deg';
      const duration = Math.random() * 12 + 8; // 8-20s

      petal.style.left = startX + 'px';
      petal.style.setProperty('--end-x', endX - startX + 'px');
      petal.style.setProperty('--rot', rot);

      petal.style.animation = `fall ${duration}s linear forwards`;

      container.appendChild(petal);

      setTimeout(() => {
        if (petal.parentNode) {
          petal.remove();
          createPetal();
        }
      }, duration * 1000);
    }

    // Create initial batch 
    setTimeout(() => {
      for (let i = 0; i < 15; i++) {
        setTimeout(createPetal, Math.random() * 5000);
      }
    }, 1000);
  </script>
</body>
